<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulkin ルームチャット</title>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #login-screen, #room-list-screen, #chat-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        input, button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }
        input {
            background: rgba(255,255,255,0.1);
            color: white;
            width: 100%;
        }
        button {
            background: #6366f1;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #4f46e5;
        }
        .room-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .message {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
        }
        .my-message {
            background: #6366f1;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .other-message {
            background: rgba(255,255,255,0.15);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
        }
        .chat-input-area input {
            flex: 1;
        }
        .hidden {
            display: none !important;
        }
        .user-info {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- ユーザー名入力画面 -->
    <div id="login-screen">
        <div class="header">Soulkin チャット</div>
        <div class="container" style="display:flex; align-items:center; justify-content:center; flex-direction:column;">
            <h2>ようこそ！</h2>
            <input type="text" id="username" placeholder="ユーザー名を入力" value="ゲスト">
            <button onclick="startChat()" style="width:300px; padding:15px;">チャットを開始</button>
        </div>
    </div>

    <!-- ルーム一覧画面 -->
    <div id="room-list-screen" class="hidden">
        <div class="header">ルーム一覧</div>
        <div class="container">
            <input type="text" id="new-room-name" placeholder="新しいルーム名">
            <button onclick="createRoom()">ルームを作成</button>
            
            <h3>参加可能なルーム</h3>
            <div id="room-list"></div>
        </div>
        <div style="padding:10px; text-align:center;">
            <button onclick="logout()">退出</button>
        </div>
    </div>

    <!-- チャット画面 -->
    <div id="chat-screen" class="hidden">
        <div class="header">
            <span id="current-room-name"></span>
            <button onclick="leaveRoom()" style="float:right; background:#ef4444; font-size:14px;">退出</button>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">送信</button>
        </div>
    </div>
