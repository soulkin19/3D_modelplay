<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロスピ風 バッティング再現ゲーム</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #d4af37; /* プロスピ風ゴールド */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            background: linear-gradient(to bottom, #1a3c1a 0%, #0d200d 100%);
            cursor: none; /* ゲーム画面内では標準カーソルを消す */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
        }

        .pitch-info {
            background: rgba(0, 0, 0, 0.8);
            border-left: 5px solid #ffcc00;
            padding: 10px 15px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            transform: skewX(-10deg);
        }

        #result-display {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 64px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 3px 3px 0px #000, -3px -3px 0px #000, 3px -3px 0px #000, -3px 3px 0px #000, 0px 5px 10px rgba(0,0,0,0.8);
            opacity: 0;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        #result-display.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 判定ごとのカラー */
        .res-homerun { color: #ff3333; animation: flash 0.3s infinite; }
        .res-hit { color: #ffcc00; }
        .res-foul { color: #cccccc; }
        .res-strike { color: #3399ff; }
        .res-out { color: #999999; }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            cursor: default;
        }

        .btn {
            background: linear-gradient(to bottom, #d4af37, #aa820a);
            border: none;
            color: black;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .btn:hover { transform: scale(1.05); }

        .controls-desc {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="score-board">
                SCORE: <span id="score">0</span> | QUICK STREAK: <span id="streak">0</span>
            </div>
            <div class="pitch-info" id="pitch-announce" style="display:none;">
                ストレート (152km/h)
            </div>
        </div>
    </div>

    <div id="result-display">HOMERUN!!</div>

    <div id="start-screen">
        <h1 style="color: #d4af37; font-size: 42px; margin-bottom: 5px; text-style: italic;">PROSPI HTML-REMAKE</h1>
        <p style="color: #ccc; margin-bottom: 30px;">~ リアルタイム・バッティングシステム ~</p>
        <button class="btn" onclick="startGame()">PLAY BALL</button>
        <div class="controls-desc">
            【操作方法】<br>
            マウス移動：ミートカーソルの移動<br>
            左クリック：スイング（タイミングを合わせろ！）<br>
            <span style="color: #ffcc00;">※中心の白い「芯」で捉えると打球スピードが上がりホームラン確率がUPします。</span>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ゲーム状態
let gameActive = false;
let score = 0;
let streak = 0;
let mouseX = 400;
let mouseY = 450;

// ピッチャーとストライクゾーンの座標設定
const PITCHER_X = 400;
const PITCHER_Y = 180;
const ZONE_X = 320;
const ZONE_Y = 380;
const ZONE_W = 160;
const ZONE_H = 160;

// 球種データ定義
const PITCH_TYPES = [
    { name: 'ストレート', speed: 153, color: '#ffffff', type: 'straight' },
    { name: 'スライダー', speed: 138, color: '#33ccff', type: 'slider' },
    { name: 'フォーク', speed: 141, color: '#ff6633', type: 'fork' },
    { name: 'カットボール', speed: 147, color: '#99ff33', type: 'cut' }
];

// ボールオブジェクト
let ball = {
    x: PITCHER_X,
    y: PITCHER_Y,
    size: 4,
    vx: 0,
    vy: 0,
    active: false,
    progress: 0, // 0から1へ進む投球進行度
    currentPitch: PITCH_TYPES[0],
    actualSpeed: 0,
    hasSwung: false,
    targetX: 400, // 最終到達予測点
    targetY: 450
};

// マウス移動イベント
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    
    // カーソル移動制限（バッターボックス付近のみ）
    if(mouseX < 200) mouseX = 200;
    if(mouseX > 600) mouseX = 600;
    if(mouseY < 300) mouseY = 300;
    if(mouseY > 550) mouseY = 550;
});

// スイング（クリック）イベント
canvas.addEventListener('mousedown', (e) => {
    if (!gameActive || !ball.active || ball.hasSwung) return;
    evaluateSwing();
});

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    score = 0;
    streak = 0;
    document.getElementById('score').innerText = score;
    document.getElementById('streak').innerText = streak;
    nextPitch();
    animate();
}

function nextPitch() {
    // 判定表示をリセット
    const resDisp = document.getElementById('result-display');
    resDisp.className = '';
    
    // ランダムな球種とコースの決定
    const pitchConfig = PITCH_TYPES[Math.floor(Math.random() * PITCH_TYPES.length)];
    const speedVariation = Math.floor(Math.random() * 6) - 3; // ±3km/hのブレ
    
    ball.currentPitch = pitchConfig;
    ball.actualSpeed = pitchConfig.speed + speedVariation;
    ball.x = PITCHER_X;
    ball.y = PITCHER_Y;
    ball.size = 4;
    ball.progress = 0;
    ball.hasSwung = false;
    
    // ストライクゾーン中心＋ランダムな散らばり（プロスピのコース決定）
    ball.targetX = ZONE_X + (ZONE_W * 0.1) + Math.random() * (ZONE_W * 0.8);
    ball.targetY = ZONE_Y + (ZONE_H * 0.1) + Math.random() * (ZONE_H * 0.8);

    // 球種アナウンスの表示
    const announce = document.getElementById('pitch-announce');
    announce.innerText = `${pitchConfig.name} (${ball.actualSpeed}km/h)`;
    announce.style.display = 'block';

    // 1秒後に投球開始
    setTimeout(() => {
        ball.active = true;
    }, 1000);
}

// 描画ループ
function animate() {
    if (!gameActive) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();
    drawStrikeZone();
    
    if (ball.active) {
        updateBall();
        drawBall();
    }
    
    drawMeetCursor();
    
    requestAnimationFrame(animate);
}

// 背景（球場イメージ）の描画
function drawBackground() {
    // マウンド
    ctx.fillStyle = '#6d5339';
    ctx.beginPath();
    ctx.ellipse(PITCHER_X, PITCHER_Y + 10, 40, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // ピッチャープレート
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(PITCHER_X - 15, PITCHER_Y + 5, 30, 4);

    // バッターボックスライン（簡易）
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 3;
    ctx.strokeRect(ZONE_X - 60, ZONE_Y - 20, 50, ZONE_H + 40); // 左打席
    ctx.strokeRect(ZONE_X + ZONE_W + 10, ZONE_Y - 20, 50, ZONE_H + 40); // 右打席
}

// プロスピ風ストライクゾーンの描画
function drawStrikeZone() {
    // 外枠
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ZONE_X, ZONE_Y, ZONE_W, ZONE_H);
    
    // 内枠（プロスピの9分割ラインを薄く描画）
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1;
    // 縦2本
    ctx.beginPath();
    ctx.moveTo(ZONE_X + ZONE_W/3, ZONE_Y); ctx.lineTo(ZONE_X + ZONE_W/3, ZONE_Y + ZONE_H);
    ctx.moveTo(ZONE_X + (ZONE_W/3)*2, ZONE_Y); ctx.lineTo(ZONE_X + (ZONE_W/3)*2, ZONE_Y + ZONE_H);
    // 横2本
    ctx.moveTo(ZONE_X, ZONE_Y + ZONE_H/3); ctx.lineTo(ZONE_X + ZONE_W, ZONE_Y + ZONE_H/3);
    ctx.moveTo(ZONE_X, ZONE_Y + (ZONE_H/3)*2); ctx.lineTo(ZONE_X + ZONE_W, ZONE_Y + (ZONE_H/3)*2);
    ctx.stroke();
}

// ボールの物理挙動（プロスピの球種変化をシミュレート）
function updateBall() {
    // 球速に応じたフレームごとの進行度（ストレートは速く、フォークは後半失速など）
    let speedFactor = (ball.actualSpeed / 150) * 0.016; 
    ball.progress += speedFactor;
    
    if (ball.progress >= 1.0) {
        // スイングされずにミットに到達した場合（ストライク/ボール判定だが今回は一律見送り三振/アウト扱い）
        ball.active = false;
        showResult('STRIKE', 'res-strike');
        streak = 0;
        document.getElementById('streak').innerText = streak;
        setTimeout(nextPitch, 2000);
        return;
    }

    // 遠近感を出すためのサイズ変更（指数関数的に手前で急激に大きくなる）
    ball.size = 3 + Math.pow(ball.progress, 3) * 26;

    // 球種ごとの変化球ロジック
    let currentX = PITCHER_X + (ball.targetX - PITCHER_X) * ball.progress;
    let currentY = PITCHER_Y + (ball.targetY - PITCHER_Y) * ball.progress;

    if (ball.currentPitch.type === 'slider') {
        // 後半にかけて急激に右（打者から見て左）へ曲がる
        if (ball.progress > 0.4) {
            currentX -= Math.pow((ball.progress - 0.4), 2) * 160;
        }
    } else if (ball.currentPitch.type === 'fork') {
        // 手前で急激に落ちる
        if (ball.progress > 0.5) {
            currentY += Math.pow((ball.progress - 0.5), 2) * 180;
        }
    } else if (ball.currentPitch.type === 'cut') {
        // 手元でわずかに小さく曲がる
        if (ball.progress > 0.7) {
            currentX -= Math.pow((ball.progress - 0.7), 2) * 80;
        }
    }

    ball.x = currentX;
    ball.y = currentY;
}

// ボールの描画（リアルな影付き）
function drawBall() {
    ctx.save();
    // ボールの影
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(ball.x + ball.size*0.2, ball.y + ball.size*0.3, ball.size, 0, Math.PI*2);
    ctx.fill();

    // ボール本体
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI*2);
    ctx.fill();

    // プロスピ風の「回転シーム（縫い目）」の簡易表現（球種色を少し混ぜる）
    ctx.strokeStyle = ball.currentPitch.color;
    ctx.lineWidth = ball.size > 8 ? 2 : 1;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size * 0.7, 0.2 * Math.PI, 0.8 * Math.PI);
    ctx.stroke();
    ctx.restore();
}

// プロスピ風「ミートカーソル」の描画
function drawMeetCursor() {
    ctx.save();
    
    // 黄色の半透明ミートエリア
    ctx.fillStyle = 'rgba(230, 180, 30, 0.25)';
    ctx.strokeStyle = 'rgba(230, 180, 30, 0.7)';
    ctx.lineWidth = 2;
    
    // 通常ミートカーソル（横長楕円形）
    const cursorW = 45;
    const cursorH = 30;
    
    ctx.beginPath();
    ctx.ellipse(mouseX, mouseY, cursorW, cursorH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    // 【プロスピのキモ】中心の「芯（ジャストミートエリア）」
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // ガイド用十字ライン
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mouseX - 15, mouseY); ctx.lineTo(mouseX + 15, mouseY);
    ctx.moveTo(mouseX, mouseY - 10); ctx.lineTo(mouseX, mouseY + 10);
    ctx.stroke();
    
    ctx.restore();
}

// スイングの判定ロジック（ここが一番本格的な部分）
function evaluateSwing() {
    ball.hasSwung = true;
    ball.active = false;

    // 1. タイミング判定 (ボールの進捗度が 0.88 ~ 0.96 の間がジャストタイミング)
    // 150km/h超の球に対してコンマ数秒のシビアな判定
    const t = ball.progress;
    let timingScore = 0; // 0が完璧、離れるほど悪い
    
    if (t >= 0.90 && t <= 0.95) {
        timingScore = Math.abs(t - 0.925); // 最高のタイミング
    } else {
        // 完全なタイミング外れ
        showResult('STRIKE (空振り)', 'res-strike');
        streak = 0;
        document.getElementById('streak').innerText = streak;
        setTimeout(nextPitch, 2000);
        return;
    }

    // 2. 位置（ミート）判定
    const distX = Math.abs(ball.x - mouseX);
    const distY = Math.abs(ball.y - mouseY);

    // 通常ミートエリア（楕円内）に入っているか判定
    const inCursor = (Math.pow(distX, 2) / Math.pow(45, 2)) + (Math.pow(distY, 2) / Math.pow(30, 2)) <= 1.0;
    // 芯（ジャストミート）に入っているか判定
    const inCenter = distX <= 8 && distY <= 8;

    if (!inCursor) {
        showResult('STRIKE (空振り)', 'res-strike');
        streak = 0;
    } else if (inCenter && timingScore < 0.015) {
        // 芯 ＆ タイミング完璧 ＝ ホームラン
        showResult('HOMERUN!!', 'res-homerun');
        score += 1000 + (streak * 200);
        streak++;
    } else if (inCenter || (inCursor && timingScore < 0.01)) {
        // どちらかが優秀 ＝ ヒット
        showResult('HIT!', 'res-hit');
        score += 500;
        streak++;
    } else if (timingScore > 0.02) {
        // タイミングが少しズレた ＝ ファウル
        showResult('FOUL', 'res-foul');
    } else {
        // カーソルの端っこ ＝ 凡打（アウト）
        showResult('OUT (凡打)', 'res-out');
        streak = 0;
    }

    document.getElementById('score').innerText = score;
    document.getElementById('streak').innerText = streak;
    
    // 2.5秒後に次の球へ
    setTimeout(nextPitch, 2500);
}

// 画面中央にド派手な判定を出す関数
function showResult(text, className) {
    const resDisp = document.getElementById('result-display');
    resDisp.innerText = text;
    resDisp.className = 'show ' + className;
}
</script>

</body>
</html>
